<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umidade do Solo · Tesla Irrigacao</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2196f3;--green:#43a047;--yellow:#ffb300;--red:#e53935;
  --panel:rgba(10,18,10,0.90);--border:rgba(80,120,60,0.35);
  --text:#d4e8c2;--dim:#6a8a5a;
  --mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;
}
body{font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;padding:16px;color:var(--text);
  background:linear-gradient(135deg,#0a1a08 0%,#0d2a0a 50%,#0a1a08 100%);}
header{text-align:center;margin-bottom:16px;margin-top:8px;}
header .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:4px;color:#a5c87a;margin-bottom:4px;}
header h1{font-size:22px;font-weight:400;letter-spacing:3px;color:#e4f5d0;text-transform:uppercase;}
#app{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  width:100%;max-width:440px;backdrop-filter:blur(10px);box-shadow:0 8px 40px rgba(0,0,0,.6);overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:12px 8px;font-family:var(--mono);font-size:10px;letter-spacing:2px;
  text-transform:uppercase;text-align:center;color:var(--dim);cursor:pointer;
  border:none;background:transparent;transition:color .2s,background .2s;}
.tab:hover{background:rgba(80,120,60,.1);}
.tab.active{color:#a5c87a;border-bottom:2px solid #a5c87a;margin-bottom:-1px;}
.tab-content{display:none;padding:20px;}
.tab-content.active{display:block;}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
svg#gauge{width:100%;max-width:270px;overflow:visible;}
.readout-row{display:flex;align-items:baseline;gap:6px;}
.readout{font-family:var(--mono);font-size:48px;color:var(--blue);
  text-shadow:0 0 20px rgba(33,150,243,.5);line-height:1;transition:color .4s,text-shadow .4s;}
.readout.green{color:var(--green);text-shadow:0 0 20px rgba(67,160,71,.5);}
.readout.yellow{color:var(--yellow);text-shadow:0 0 20px rgba(255,179,0,.5);}
.readout.red{color:var(--red);text-shadow:0 0 20px rgba(229,57,53,.5);}
.readout-unit{font-family:var(--mono);font-size:13px;color:var(--dim);letter-spacing:2px;}
.moisture-label{font-family:var(--mono);font-size:11px;letter-spacing:3px;
  text-transform:uppercase;color:var(--blue);transition:color .4s;margin-top:-2px;}
.moisture-label.green{color:var(--green);}
.moisture-label.yellow{color:var(--yellow);}
.moisture-label.red{color:var(--red);}
.instrucao{font-family:var(--sans);font-size:12px;font-weight:500;color:#a5c87a;
  background:rgba(33,150,67,.12);border:1px solid rgba(100,180,80,.3);
  border-radius:20px;padding:6px 14px;margin-top:6px;text-align:center;}
.legend{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;color:var(--dim);}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.history-label{font-family:var(--mono);font-size:9px;color:var(--dim);
  letter-spacing:3px;margin-top:14px;margin-bottom:5px;text-transform:uppercase;}
canvas#sparkline{width:100%;height:44px;display:block;border-bottom:1px solid var(--border);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
  background:var(--border);border:1px solid var(--border);border-radius:3px;
  margin-top:12px;overflow:hidden;}
.stat{background:rgba(10,18,10,.7);padding:8px;text-align:center;}
.stat-val{font-family:var(--mono);font-size:15px;color:var(--text);}
.stat-lbl{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:2px;margin-top:2px;}
.status-bar{display:flex;align-items:center;gap:8px;margin-top:14px;
  padding-top:12px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--dim);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;}
.dot.connected{background:var(--green);box-shadow:0 0 5px var(--green);}
.dot.connecting{background:var(--yellow);animation:pulse 1s infinite;}
.dot.disconnected{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.status-text{flex:1;}
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.hist-title{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:#a5c87a;text-transform:uppercase;}
.hist-clear{font-family:var(--mono);font-size:9px;color:var(--dim);
  background:transparent;border:1px solid var(--border);border-radius:3px;
  padding:4px 8px;cursor:pointer;letter-spacing:1px;}
.hist-clear:hover{border-color:var(--red);color:var(--red);}
.day-list{display:flex;flex-direction:column;gap:10px;max-height:500px;overflow-y:auto;}
.day-card{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:4px;padding:12px;}
.day-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.day-date{font-family:var(--mono);font-size:11px;color:#a5c87a;letter-spacing:1px;}
.day-stats{display:flex;gap:12px;}
.day-stat{font-family:var(--mono);font-size:10px;color:var(--dim);}
.day-stat span{color:var(--text);}
canvas.day-chart{width:100%;height:50px;display:block;}
.no-data{text-align:center;font-family:var(--mono);font-size:11px;color:var(--dim);
  padding:40px 0;letter-spacing:2px;}
</style>
</head>
<body>
<header>
  <div class="eyebrow">ESP32 · MQTT · Umidade do Solo</div>
  <h1>Umidade do Solo</h1>
</header>
<div id="app">
  <div class="tabs">
    <button class="tab active" onclick="showTab('ao-vivo',this)">&#9679; AO VIVO</button>
    <button class="tab" onclick="showTab('historico',this)">&#128197; HISTORICO</button>
  </div>
  <div id="tab-ao-vivo" class="tab-content active">
    <div class="gauge-wrap">
      <svg id="gauge" viewBox="0 0 270 270">
        <defs>
          <radialGradient id="rimG" cx="50%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#f0f0f0"/><stop offset="40%" stop-color="#c8c8c8"/>
            <stop offset="70%" stop-color="#888"/><stop offset="100%" stop-color="#bbb"/>
          </radialGradient>
          <radialGradient id="faceG" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#e8e8e8"/>
          </radialGradient>
          <radialGradient id="pivG" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#fff"/><stop offset="50%" stop-color="#aaa"/>
            <stop offset="100%" stop-color="#444"/>
          </radialGradient>
          <filter id="ds"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,.3)"/></filter>
          <filter id="ns"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,.4)"/></filter>
        </defs>
        <circle cx="136" cy="138" r="120" fill="rgba(0,0,0,.22)" filter="url(#ds)"/>
        <circle cx="135" cy="135" r="120" fill="url(#rimG)"/>
        <circle cx="135" cy="135" r="109" fill="#333"/>
        <circle cx="135" cy="135" r="106" fill="url(#faceG)"/>
        <g id="zoneArc"></g>
        <g id="tickGroup"></g>
        <g id="labelGroup"></g>
        <circle cx="135" cy="152" r="31" fill="white" opacity=".88"/>
        <g transform="translate(135,152) scale(0.33)">
          <path d="M0,-80 C-8,-55 -36,-28 -36,10 C-36,36 -18,54 0,58 C18,54 36,36 36,10 C36,-28 8,-55 0,-80Z" fill="none" stroke="#1a2060" stroke-width="10" stroke-linejoin="round"/>
          <path d="M-40,14 Q-40,56 0,56 Q40,56 40,14" fill="none" stroke="#1a2060" stroke-width="10" stroke-linecap="round"/>
          <rect x="-6" y="18" width="12" height="28" rx="3" fill="#1a2060"/>
          <rect x="-11" y="9" width="22" height="11" rx="4" fill="#1a2060"/>
          <path d="M-40,17 Q-68,4 -86,11" fill="none" stroke="#2196f3" stroke-width="7" stroke-linecap="round"/>
          <path d="M-36,7 Q-58,-8 -74,-5" fill="none" stroke="#2196f3" stroke-width="5" stroke-linecap="round"/>
          <path d="M40,17 Q68,4 86,11" fill="none" stroke="#2196f3" stroke-width="7" stroke-linecap="round"/>
          <path d="M36,7 Q58,-8 74,-5" fill="none" stroke="#2196f3" stroke-width="5" stroke-linecap="round"/>
          <text x="0" y="96" text-anchor="middle" font-family="Arial" font-size="26" font-weight="bold" fill="#1a2060" letter-spacing="3">TESLA</text>
          <text x="0" y="116" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a2060">SISTEMAS DE IRRIGACAO</text>
        </g>
        <text x="135" y="124" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333" letter-spacing="1">% VWC</text>
        <g id="needleGroup" transform="translate(135,135) rotate(0)">
          <polygon points="0,-100 -3,0 0,14 3,0" fill="#111" filter="url(#ns)"/>
          <ellipse cx="0" cy="19" rx="5" ry="8" fill="#222"/>
          <circle cx="0" cy="0" r="9" fill="url(#pivG)" stroke="#888" stroke-width=".5"/>
          <circle cx="0" cy="0" r="3" fill="#333"/>
        </g>
        <g stroke="#666" stroke-width=".8">
          <circle cx="135" cy="25" r="3" fill="#bbb" stroke="#888" stroke-width=".5"/>
          <line x1="132" y1="25" x2="138" y2="25"/><line x1="135" y1="22" x2="135" y2="28"/>
          <circle cx="135" cy="245" r="3" fill="#bbb" stroke="#888" stroke-width=".5"/>
          <line x1="132" y1="245" x2="138" y2="245"/><line x1="135" y1="242" x2="135" y2="248"/>
          <circle cx="25" cy="135" r="3" fill="#bbb" stroke="#888" stroke-width=".5"/>
          <line x1="22" y1="135" x2="28" y2="135"/><line x1="25" y1="132" x2="25" y2="138"/>
          <circle cx="245" cy="135" r="3" fill="#bbb" stroke="#888" stroke-width=".5"/>
          <line x1="242" y1="135" x2="248" y2="135"/><line x1="245" y1="132" x2="245" y2="138"/>
        </g>
        <ellipse cx="108" cy="80" rx="30" ry="17" fill="rgba(255,255,255,.09)" transform="rotate(-30,108,80)"/>
      </svg>
      <div class="readout-row">
        <div class="readout" id="readout">--.-</div>
        <div class="readout-unit">%</div>
      </div>
      <div class="moisture-label" id="moistureLabel">AGUARDANDO LEITURA</div>
      <div class="instrucao">&#128167; Manter a umidade entre 28% e 35% VWC</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>acima 38% SATURADO</div>
        <div class="legend-item"><div class="legend-dot" style="background:#43a047"></div>28% a 35% IDEAL</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffb300"></div>22% a 28% ATENCAO</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e53935"></div>abaixo 22% CRITICO</div>
      </div>
    </div>
    <div class="history-label">Hoje</div>
    <canvas id="sparkline"></canvas>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="statMin">--</div><div class="stat-lbl">MIN %</div></div>
      <div class="stat"><div class="stat-val" id="statAvg">--</div><div class="stat-lbl">MED %</div></div>
      <div class="stat"><div class="stat-val" id="statMax">--</div><div class="stat-lbl">MAX %</div></div>
    </div>
    <div class="status-bar">
      <div class="dot connecting" id="dot"></div>
      <span class="status-text" id="statusText">Conectando ao servidor MQTT...</span>
    </div>
  </div>
  <div id="tab-historico" class="tab-content">
    <div class="hist-header">
      <div class="hist-title">Ultimos 30 dias</div>
      <button class="hist-clear" onclick="clearHistory()">Limpar</button>
    </div>
    <div class="day-list" id="dayList">
      <div class="no-data" id="noData">Nenhum dado salvo ainda.</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
<script>
var MQTT_HOST  = 'd828af3ba9e34e11a4d3142ffc029813.s1.eu.hivemq.cloud';
var MQTT_PORT  = 8884;
var MQTT_USER  = 'HENRIQUE+stinghel';
var MQTT_PASS  = 'Tesla123@';
var MQTT_TOPIC = 'tesla/tensometro/kpa';

// Zonas para cafe conilon em solo argiloso
// acima 38% = SATURADO (azul)
// 28-35% = IDEAL (verde)
// 22-28% = ATENCAO (amarelo)
// abaixo 22% = CRITICO (vermelho)
var CX=135,CY=135,R=84,START_DEG=220,SWEEP=260,MIN_VAL=0,MAX_VAL=100;
var ZONES=[
  {from:0,  to:22,  color:'#e53935', label:'CRITICO'},
  {from:22, to:28,  color:'#ffb300', label:'ATENCAO'},
  {from:28, to:35,  color:'#43a047', label:'IDEAL'},
  {from:35, to:38,  color:'#43a047', label:'IDEAL'},
  {from:38, to:100, color:'#2196f3', label:'SATURADO'},
];
var ZCOLORS={'SATURADO':'#2196f3','IDEAL':'#43a047','ATENCAO':'#ffb300','CRITICO':'#e53935'};

function getZone(v){
  if(v>=38) return ZONES[4];
  if(v>=35) return ZONES[3];
  if(v>=28) return ZONES[2];
  if(v>=22) return ZONES[1];
  return ZONES[0];
}
function v2a(v){return START_DEG+(v-MIN_VAL)/(MAX_VAL-MIN_VAL)*SWEEP;}
function polar(cx,cy,r,deg){var rad=(deg-90)*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};}
function arcPath(cx,cy,r,a1,a2){
  if(Math.abs(a2-a1)<0.01)return'';
  var s=polar(cx,cy,r,a1),e=polar(cx,cy,r,a2);
  return'M'+s.x.toFixed(1)+' '+s.y.toFixed(1)+' A'+r+' '+r+' 0 '+((a2-a1)>180?1:0)+' 1 '+e.x.toFixed(1)+' '+e.y.toFixed(1);
}

function buildGauge(){
  var ns='http://www.w3.org/2000/svg';
  var zG=document.getElementById('zoneArc');
  var tG=document.getElementById('tickGroup');
  var lG=document.getElementById('labelGroup');

  // Zonas coloridas
  var zoneRanges=[
    {from:0,  to:22,  color:'#e53935'},
    {from:22, to:28,  color:'#ffb300'},
    {from:28, to:38,  color:'#43a047'},
    {from:38, to:100, color:'#2196f3'},
  ];
  zoneRanges.forEach(function(z){
    var a1=v2a(z.from),a2=v2a(z.to);
    var el=document.createElementNS(ns,'path');
    el.setAttribute('d',arcPath(CX,CY,106,Math.min(a1,a2),Math.max(a1,a2)));
    el.setAttribute('fill','none');el.setAttribute('stroke',z.color);
    el.setAttribute('stroke-width','6');el.setAttribute('stroke-linecap','butt');
    zG.appendChild(el);
  });

  // Ticks a cada 5%
  for(var v=MIN_VAL;v<=MAX_VAL;v+=5){
    var ang=v2a(v),maj=v%10===0;
    var r1=R+5,r2=R+(maj?19:10);
    var p1=polar(CX,CY,r1,ang),p2=polar(CX,CY,r2,ang);
    var ln=document.createElementNS(ns,'line');
    ln.setAttribute('x1',p1.x);ln.setAttribute('y1',p1.y);
    ln.setAttribute('x2',p2.x);ln.setAttribute('y2',p2.y);
    ln.setAttribute('stroke','#333');ln.setAttribute('stroke-width',maj?'2':'1');
    tG.appendChild(ln);
    if(maj){
      var lp=polar(CX,CY,r2+11,ang);
      var tx=document.createElementNS(ns,'text');
      tx.setAttribute('x',lp.x);tx.setAttribute('y',lp.y);
      tx.setAttribute('text-anchor','middle');tx.setAttribute('dominant-baseline','middle');
      tx.setAttribute('font-family','Arial,sans-serif');tx.setAttribute('font-size','9');
      tx.setAttribute('font-weight','bold');tx.setAttribute('fill','#222');
      tx.textContent=v;lG.appendChild(tx);
    }
  }
}

var hist=[];
var sessionReadings=[];

function setGauge(val){
  val=Math.max(MIN_VAL,Math.min(MAX_VAL,val));
  var z=getZone(val);
  document.getElementById('needleGroup').setAttribute('transform','translate('+CX+','+CY+') rotate('+(v2a(val))+')')  ;
  var rd=document.getElementById('readout');
  rd.textContent=val.toFixed(1);
  var cls=z.label==='SATURADO'?'':z.label==='IDEAL'?'green':z.label==='ATENCAO'?'yellow':'red';
  rd.className='readout'+(cls?' '+cls:'');
  var ml=document.getElementById('moistureLabel');
  ml.textContent=z.label;ml.className='moisture-label'+(cls?' '+cls:'');
  hist.push(val);if(hist.length>240)hist.shift();
  sessionReadings.push(val);
  if(sessionReadings.length%10===0)saveTodayToStorage();
  updateStats();drawSparkline();
}

function updateStats(){
  if(!hist.length)return;
  document.getElementById('statMin').textContent=Math.min.apply(null,hist).toFixed(1);
  document.getElementById('statMax').textContent=Math.max.apply(null,hist).toFixed(1);
  document.getElementById('statAvg').textContent=(hist.reduce(function(a,b){return a+b;},0)/hist.length).toFixed(1);
}

function drawSparkline(){
  var c=document.getElementById('sparkline');
  var W=c.offsetWidth||380,H=44;
  c.width=W;c.height=H;
  var ctx=c.getContext('2d');ctx.clearRect(0,0,W,H);
  if(hist.length<2)return;
  var range=MAX_VAL-MIN_VAL;
  for(var i=1;i<hist.length;i++){
    var x0=(i-1)/(hist.length-1)*W,x1=i/(hist.length-1)*W;
    var y0=H-((hist[i-1]-MIN_VAL)/range)*H,y1=H-((hist[i]-MIN_VAL)/range)*H;
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);
    ctx.strokeStyle=ZCOLORS[getZone(hist[i]).label];ctx.lineWidth=2;ctx.stroke();
  }
}

function todayKey(){var d=new Date();return'day_'+d.getFullYear()+'_'+(d.getMonth()+1)+'_'+d.getDate();}
function todayLabel(){return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});}
function saveTodayToStorage(){
  if(!sessionReadings.length)return;
  var vals=sessionReadings;
  var data={label:todayLabel(),readings:vals,
    min:Math.min.apply(null,vals).toFixed(1),
    max:Math.max.apply(null,vals).toFixed(1),
    avg:(vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1)};
  try{localStorage.setItem(todayKey(),JSON.stringify(data));pruneOldDays();}catch(e){}
}
function pruneOldDays(){
  var keys=Object.keys(localStorage).filter(function(k){return k.startsWith('day_');});
  if(keys.length<=30)return;
  keys.sort();keys.slice(0,keys.length-30).forEach(function(k){localStorage.removeItem(k);});
}
function loadHistory(){
  var keys=Object.keys(localStorage).filter(function(k){return k.startsWith('day_');}).sort().reverse();
  var list=document.getElementById('dayList');
  var noData=document.getElementById('noData');
  list.querySelectorAll('.day-card').forEach(function(c){c.remove();});
  if(!keys.length){noData.style.display='block';return;}
  noData.style.display='none';
  keys.forEach(function(key){
    try{
      var data=JSON.parse(localStorage.getItem(key));if(!data)return;
      var card=document.createElement('div');card.className='day-card';
      var hdr=document.createElement('div');hdr.className='day-card-header';
      var dateEl=document.createElement('div');dateEl.className='day-date';dateEl.textContent=data.label;
      var statsEl=document.createElement('div');statsEl.className='day-stats';
      statsEl.innerHTML='<div class="day-stat">MIN <span>'+data.min+'%</span></div>'+
        '<div class="day-stat">MED <span>'+data.avg+'%</span></div>'+
        '<div class="day-stat">MAX <span>'+data.max+'%</span></div>';
      hdr.appendChild(dateEl);hdr.appendChild(statsEl);card.appendChild(hdr);
      var cv=document.createElement('canvas');cv.className='day-chart';card.appendChild(cv);
      list.appendChild(card);
      drawDayChart(cv,data.readings);
    }catch(e){}
  });
}
function drawDayChart(canvas,readings){
  if(!readings||readings.length<2)return;
  setTimeout(function(){
    var W=canvas.offsetWidth||380,H=50;canvas.width=W;canvas.height=H;
    var ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
    var range=MAX_VAL-MIN_VAL;
    for(var i=1;i<readings.length;i++){
      var x0=(i-1)/(readings.length-1)*W,x1=i/(readings.length-1)*W;
      var y0=H-((readings[i-1]-MIN_VAL)/range)*H,y1=H-((readings[i]-MIN_VAL)/range)*H;
      ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);
      ctx.strokeStyle=ZCOLORS[getZone(readings[i]).label];ctx.lineWidth=2;ctx.stroke();
    }
  },50);
}
function clearHistory(){
  if(!confirm('Apagar todo o historico?'))return;
  Object.keys(localStorage).filter(function(k){return k.startsWith('day_');}).forEach(function(k){localStorage.removeItem(k);});
  loadHistory();
}
function showTab(id,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='historico')loadHistory();
}

function setStatus(s,m){
  document.getElementById('dot').className='dot '+s;
  document.getElementById('statusText').textContent=m;
}

function conectarMQTT(){
  var clientId='web-tesla-'+Math.random().toString(16).substr(2,8);
  var client=new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, '/mqtt', clientId);
  client.onConnectionLost=function(r){
    setStatus('disconnected','Desconectado. Reconectando...');
    setTimeout(conectarMQTT,5000);
  };
  client.onMessageArrived=function(msg){
    var v=parseFloat(msg.payloadString);
    if(!isNaN(v))setGauge(v);
  };
  setStatus('connecting','Conectando ao HiveMQ...');
  client.connect({
    useSSL:true,
    userName:MQTT_USER,
    password:MQTT_PASS,
    onSuccess:function(){
      setStatus('connected','Conectado · Recebendo dados ao vivo');
      client.subscribe(MQTT_TOPIC);
    },
    onFailure:function(e){
      setStatus('disconnected','Falha na conexao. Tentando novamente...');
      setTimeout(conectarMQTT,5000);
    }
  });
}

setInterval(saveTodayToStorage,5*60*1000);
buildGauge();
setGauge(0);
window.addEventListener('resize',drawSparkline);
conectarMQTT();
</script>
