<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tensômetro de Solo · ESP32</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:    #2196f3;
    --green:   #43a047;
    --yellow:  #ffb300;
    --red:     #e53935;
    --panel:   rgba(10, 18, 10, 0.82);
    --border:  rgba(80,120,60,0.35);
    --text:    #d4e8c2;
    --dim:     #6a8a5a;
    --mono:    'Share Tech Mono', monospace;
    --sans:    'Barlow', sans-serif;
  }

  body {
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
    background: #0a1a08;
    color: var(--text);
  }

  /* ── FUNDO: lavoura de café SVG ── */
  #bg-coffee {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* overlay escurecedor */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(5,15,5,0.55) 0%,
      rgba(5,15,5,0.30) 40%,
      rgba(5,15,5,0.65) 100%
    );
    z-index: 1;
    pointer-events: none;
  }

  header, .card { position: relative; z-index: 2; }

  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 4px;
    color: #a5c87a;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  header h1 {
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 3px;
    color: #e4f5d0;
    text-transform: uppercase;
  }
  header h2 {
    font-size: 12px;
    font-weight: 300;
    color: var(--dim);
    letter-spacing: 2px;
    margin-top: 3px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 28px 28px 24px;
    width: 100%;
    max-width: 460px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  /* ── GAUGE ── */
  .gauge-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  svg#gauge {
    overflow: visible;
    width: 100%;
    max-width: 360px;
  }

  /* digital readout */
  .readout-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .readout {
    font-family: var(--mono);
    font-size: 52px;
    font-weight: 400;
    color: var(--blue);
    letter-spacing: 1px;
    text-shadow: 0 0 24px rgba(33,150,243,0.5);
    line-height: 1;
    transition: color 0.4s, text-shadow 0.4s;
  }
  .readout.green  { color: var(--green);  text-shadow: 0 0 24px rgba(67,160,71,0.5); }
  .readout.yellow { color: var(--yellow); text-shadow: 0 0 24px rgba(255,179,0,0.5); }
  .readout.red    { color: var(--red);    text-shadow: 0 0 24px rgba(229,57,53,0.5); }

  .readout-unit {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  /* moisture label */
  .moisture-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--blue);
    transition: color 0.4s;
    margin-top: -4px;
  }
  .moisture-label.green  { color: var(--green); }
  .moisture-label.yellow { color: var(--yellow); }
  .moisture-label.red    { color: var(--red); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.connected    { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .dot.connecting   { background: var(--yellow); animation: pulse 1s infinite; }
  .dot.disconnected { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-text { flex: 1; }

  /* ── WS CONFIG ── */
  .ws-config {
    margin-top: 14px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .ws-config input {
    flex: 1;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .ws-config input:focus { border-color: #a5c87a; }
  .ws-config button {
    background: transparent;
    border: 1px solid #6a9a4a;
    color: #a5c87a;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 7px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .ws-config button:hover { background: #6a9a4a; color: #000; }

  /* ── HISTORY ── */
  .history-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 3px;
    margin-top: 18px;
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  canvas#sparkline {
    width: 100%;
    height: 44px;
    display: block;
    border-bottom: 1px solid var(--border);
  }

  /* ── STATS ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-top: 16px;
    overflow: hidden;
  }
  .stat {
    background: rgba(10,18,10,0.7);
    padding: 9px;
    text-align: center;
  }
  .stat-val {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text);
  }
  .stat-lbl {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-top: 2px;
  }
</style>
</head>

<header>
  <div class="eyebrow">ESP32 · WebSocket · Umidade do Solo</div>
  <h1>Tensômetro</h1>

<div class="card">
  <div class="gauge-wrap">

    <!-- SVG Gauge -->
    <svg id="gauge" viewBox="0 0 300 195">
      <defs>
        <radialGradient id="faceGrad" cx="50%" cy="55%" r="55%">
          <stop offset="0%" stop-color="#182a0e"/>
          <stop offset="100%" stop-color="#0a100a"/>
        </radialGradient>
      </defs>

      <!-- Face -->
      <circle cx="150" cy="150" r="132" fill="url(#faceGrad)" stroke="rgba(80,120,60,0.3)" stroke-width="1.5"/>

      <g id="arcGroup"></g>
      <g id="tickGroup"></g>
      <g id="labelGroup"></g>

      <!-- Needle -->
      <g id="needleGroup" transform="translate(150,150) rotate(-120)">
        <polygon points="0,-112 -5,0 0,13 5,0" fill="#ff4444"

      </g>

      <!-- Unit label -->
      <text x="150" y="136" font-family="Share Tech Mono,monospace" font-size="11"
        fill="#6a8a5a" text-anchor="middle" letter-spacing="1">kPa</text>
    </svg>

    <!-- Readout -->
    <div class="readout-row">
      <div class="readout" id="readout">--.-</div>
      <div class="readout-unit">kPa</div>
    </div>
    <div class="moisture-label" id="moistureLabel">AGUARDANDO LEITURA</div>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>0 a −10 · SATURADO</div>
      <div class="legend-item"><div class="legend-dot" style="background:#43a047"></div>−10 a −20 · IDEAL</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffb300"></div>−20 a −30 · ATENÇÃO</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e53935"></div>abaixo −30 · CRÍTICO</div>
    </div>
  </div>

  <!-- Sparkline -->
  <div class="history-label">Histórico de Tensão</div>
  <canvas id="sparkline"></canvas>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="statMin">--</div>
      <div class="stat-lbl">MÍN kPa</div>
    </div>

    </div>

<script>
// ═══════════════════════════════════════════════
// GAUGE CONFIG
// ═══════════════════════════════════════════════
const CX = 150, CY = 150, R = 112;
const START_DEG = 210;
const SWEEP     = 240;
const MIN_VAL   = -60;
const MAX_VAL   =  0;

// Zones: 0 to -10 blue, -10 to -20 green, -20 to -30 yellow, -30 to -60 red
const ZONES = [
  { from:   0, to: -10, color: '#2196f3', label: 'SATURADO' },
  { from: -10, to: -20, color: '#43a047', label: 'IDEAL' },
  { from: -20, to: -30, color: '#ffb300', label: 'ATENÇÃO' },
  { from: -30, to: -60, color: '#e53935', label: 'CRÍTICO' },
];

function getZone(val) {
  if (val >= -10) return ZONES[0];
  if (val >= -20) return ZONES[1];
  if (val >= -30) return ZONES[2];
  return ZONES[3];
}

function valToAngle(val) {
  const pct = (val - MIN_VAL) / (MAX_VAL - MIN_VAL);
  return START_DEG + pct * SWEEP;
}

function polar(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function arcPath(cx, cy, r, startDeg, endDeg) {
  if (Math.abs(endDeg - startDeg) < 0.01) return '';
  const s = polar(cx, cy, r, startDeg);
  const e = polar(cx, cy, r, endDeg);
  const large = (endDeg - startDeg) > 180 ? 1 : 0;
  return `M ${s.x.toFixed(2)} ${s.y.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${e.x.toFixed(2)} ${e.y.toFixed(2)}`;
}

function buildGauge() {
  const arcG  = document.getElementById('arcGroup');
  const tickG = document.getElementById('tickGroup');
  const lblG  = document.getElementById('labelGroup');

  // BG arc
  const bg = document.createElementNS('http://www.w3.org/2000/svg','path');
  bg.setAttribute('d', arcPath(CX, CY, R, START_DEG, START_DEG + SWEEP));
  bg.setAttribute('fill','none');
  bg.setAttribute('stroke','#182a0e');
  bg.setAttribute('stroke-width','20');
  bg.setAttribute('stroke-linecap','butt');
  arcG.appendChild(bg);

  // Zone arcs (background color bands)
  // Note: val goes 0 → -60, so START_DEG+SWEEP = 0 kPa side, START_DEG = -60 kPa side
  // valToAngle(0) = START_DEG + SWEEP = 450 = 90 (right side)
  // valToAngle(-60) = START_DEG = 210 (left side)
  // So zones drawn from their "from" angle to "to" angle
  ZONES.forEach(z => {
    const a1 = valToAngle(z.from);
    const a2 = valToAngle(z.to);
    const startA = Math.min(a1,a2), endA = Math.max(a1,a2);
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', arcPath(CX, CY, R, startA, endA));
    p.setAttribute('fill','none');
    p.setAttribute('stroke', z.color);
    p.setAttribute('stroke-width','20');
    p.setAttribute('stroke-linecap','butt');
    p.setAttribute('opacity','0.28');
    arcG.appendChild(p);
  });

  // Active fill arc
  const fill = document.createElementNS('http://www.w3.org/2000/svg','path');
  fill.id = 'arcFill';
  fill.setAttribute('fill','none');
  fill.setAttribute('stroke','#2196f3');
  fill.setAttribute('stroke-width','20');
  fill.setAttribute('stroke-linecap','butt');
  fill.setAttribute('opacity','0');
  arcG.appendChild(fill);

  // Ticks & labels
  for (let v = MIN_VAL; v <= MAX_VAL; v += 5) {
    const angle = valToAngle(v);
    const isMaj = v % 10 === 0;
    const r1 = R + 13, r2 = R + (isMaj ? 26 : 19);
    const p1 = polar(CX, CY, r1, angle);
    const p2 = polar(CX, CY, r2, angle);
    const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1', p1.x); ln.setAttribute('y1', p1.y);
    ln.setAttribute('x2', p2.x); ln.setAttribute('y2', p2.y);
    ln.setAttribute('stroke', isMaj ? '#5a7a4a' : '#2a3a2a');
    ln.setAttribute('stroke-width', isMaj ? '1.5' : '1');
    tickG.appendChild(ln);

    if (isMaj) {
      const lp = polar(CX, CY, r2 + 14, angle);
      const tx = document.createElementNS('http://www.w3.org/2000/svg','text');
      tx.setAttribute('x', lp.x); tx.setAttribute('y', lp.y);
      tx.setAttribute('text-anchor','middle');
      tx.setAttribute('dominant-baseline','middle');
      tx.setAttribute('font-family','Share Tech Mono, monospace');
      tx.setAttribute('font-size','10');
      tx.setAttribute('fill','#4a6a3a');
      tx.textContent = v;
      lblG.appendChild(tx);
    }
  }
}

// ═══════════════════════════════════════════════
// SET GAUGE
// ═══════════════════════════════════════════════
let currentVal = null;

function setGauge(val) {
  val = Math.max(MIN_VAL, Math.min(MAX_VAL, val));
  currentVal = val;

  const zone = getZone(val);

  // Needle rotation
  const needleRot = valToAngle(val) - 90;
  document.getElementById('needleGroup').setAttribute('transform',
    `translate(${CX},${CY}) rotate(${needleRot})`);

  // Arc fill — from 0 kPa (right side = MAX angle) down to current val
  const fillEl = document.getElementById('arcFill');
  const startA = valToAngle(val);
  const endA   = valToAngle(MAX_VAL);
  if (startA < endA) {
    fillEl.setAttribute('d', arcPath(CX, CY, R, startA, endA));
    fillEl.setAttribute('stroke', zone.color);
    fillEl.setAttribute('opacity','0.9');
  } else {
    fillEl.setAttribute('opacity','0');
  }

  // Readout
  const rd = document.getElementById('readout');
  rd.textContent = val.toFixed(1);
  const cls = zone === ZONES[0] ? '' : zone === ZONES[1] ? 'green' : zone === ZONES[2] ? 'yellow' : 'red';
  rd.className = 'readout' + (cls ? ' ' + cls : '');

  // Moisture label
  const ml = document.getElementById('moistureLabel');
  ml.textContent = zone.label;
  ml.className = 'moisture-label' + (cls ? ' ' + cls : '');

  addHistory(val);
  updateStats();
  drawSparkline();
}

// ═══════════════════════════════════════════════
// HISTORY & STATS
// ═══════════════════════════════════════════════
const HISTORY_SIZE = 120;
const history = [];

function addHistory(v) {
  history.push(v);
  if (history.length > HISTORY_SIZE) history.shift();
}

function updateStats() {
  if (!history.length) return;
  const mn = Math.min(...history), mx = Math.max(...history);
  const avg = history.reduce((a,b)=>a+b,0)/history.length;
  document.getElementById('statMin').textContent = mn.toFixed(1);
  document.getElementById('statMax').textContent = mx.toFixed(1);
  document.getElementById('statAvg').textContent = avg.toFixed(1);
}

function getSparkColor(v) {
  const z = getZone(v);
  return z.color;
}

function drawSparkline() {
  const c = document.getElementById('sparkline');
  const W = c.offsetWidth || 400, H = 44;
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if (history.length < 2) return;

  const range = MAX_VAL - MIN_VAL;

  // grid
  ctx.strokeStyle = 'rgba(80,120,60,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([2,5]);
  [0.25,0.5,0.75].forEach(f => {
    ctx.beginPath(); ctx.moveTo(0,H*f); ctx.lineTo(W,H*f); ctx.stroke();
  });
  ctx.setLineDash([]);

  // colored segments
  for (let i = 1; i < history.length; i++) {
    const x0 = ((i-1)/(history.length-1))*W;
    const x1 = (i/(history.length-1))*W;
    const y0 = H - ((history[i-1] - MIN_VAL)/range)*H;
    const y1 = H - ((history[i]   - MIN_VAL)/range)*H;
    ctx.beginPath();
    ctx.moveTo(x0, y0); ctx.lineTo(x1, y1);
    ctx.strokeStyle = getSparkColor(history[i]);
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // fill under with last color
  ctx.beginPath();
  history.forEach((v,i) => {
    const x = (i/(history.length-1))*W;
    const y = H - ((v - MIN_VAL)/range)*H;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  ctx.fillStyle = 'rgba(33,150,243,0.06)';
  ctx.fill();
}

// ═══════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════
let ws = null;

function setStatus(state, msg) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('statusText').textContent = msg;
}

function connectWS() {
  if (ws) { ws.close(); ws = null; }
  const url = document.getElementById('wsUrl').value.trim();
  if (!url) return;
  setStatus('connecting', 'Conectando a ' + url + '...');
  try { ws = new WebSocket(url); } catch(e) { setStatus('disconnected','URL inválida.'); return; }

  ws.onopen  = () => {
    setStatus('connected','Conectado · ' + url);
    document.getElementById('connectBtn').textContent = 'DESCONECTAR';
    document.getElementById('connectBtn').onclick = disconnectWS;
    if (demoInterval) { clearInterval(demoInterval); demoInterval = null; }
  };
  ws.onclose = () => {
    setStatus('disconnected','Desconectado. Clique em conectar.');
    document.getElementById('connectBtn').textContent = 'CONECTAR';
    document.getElementById('connectBtn').onclick = connectWS;
    ws = null;
  };
  ws.onerror = () => setStatus('disconnected','Erro na conexão.');
  ws.onmessage = (event) => {
    let val = null;
    try { const d = JSON.parse(event.data); val = d.kpa ?? d.pressure ?? d.value ?? d.vacuum ?? null; }
    catch { val = parseFloat(event.data); }
    if (val !== null && !isNaN(val)) setGauge(val);
  };
}

function disconnectWS() { if (ws) ws.close(); }

// ═══════════════════════════════════════════════
// DEMO MODE
// ═══════════════════════════════════════════════
let demoInterval = null;
let demoVal = -5;

function startDemo() {
  demoInterval = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) { clearInterval(demoInterval); return; }
    demoVal += (Math.random() - 0.45) * 2.5;
    demoVal = Math.max(-60, Math.min(0, demoVal));
    setGauge(demoVal);
  }, 600);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
buildGauge();
setGauge(0);
window.addEventListener('resize', drawSparkline);

setTimeout(() => {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    setStatus('disconnected', 'Demo · Insira o IP do ESP32 e clique em conectar');
    startDemo();
  }
}, 1500);
</script>
